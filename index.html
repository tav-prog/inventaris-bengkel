<!DOCTYPE html>
<html>
<head>
  <title>Inventaris Bengkel</title>
</head>
<body>

<h2>Login</h2>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<div id="app" style="display:none;">
  <h2>Peminjaman Alat</h2>
  <input id="nama" placeholder="Nama"><br>
  <input id="alat" placeholder="Nama Alat"><br>
  <button onclick="pinjam()">Pinjam</button>

  <h3>Data Peminjaman</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Nama</th>
        <th>Alat</th>
        <th>Tanggal</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tabelData"></tbody>
  </table>

  <button onclick="loadData()">Refresh Data</button>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbyR76X8a70WxvKOEupMuX9dr5wwThwIXiusdxgdDaxNG7ZZVnYjqHnK0lelyUxl5SLVGQ/exec";

// 🔐 LOGIN
function login() {
  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "success") {
      alert("Login berhasil");
      document.getElementById("app").style.display = "block";
      loadData(); // 🔥 auto load data
    } else {
      alert("Login gagal");
    }
  });
}

// 📥 PINJAM
function pinjam() {
  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      action: "pinjam",
      nama: document.getElementById("nama").value,
      alat: document.getElementById("alat").value,
      tanggal: new Date().toLocaleString()
    })
  })
  .then(res => res.json())
  .then(res => {
    alert("Data tersimpan!");
    loadData(); // 🔥 refresh otomatis
  });
}

// 📊 AMBIL DATA (ANTI CORS)
function loadData() {
  fetch(url + "?action=getData")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(d => {
      html += `
        <tr>
          <td>${d.nama}</td>
          <td>${d.alat}</td>
          <td>${d.tanggal}</td>
          <td>${d.status}</td>
        </tr>
      `;
    });

    document.getElementById("tabelData").innerHTML = html;
  });
}
</script>

</body>
</html>
